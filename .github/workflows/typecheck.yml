name: typecheck

# Gate every PR on typecheck + the api.ts contract suite + build. The
# dashboard ran 12 PRs without any gate; today's BacktestRun wire-shape
# drift across two repos cost three PRs to converge. The contract
# tests in src/services/api.test.ts pin exactly that kind of drift on
# PR open.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        # api.ts contract suite (Vitest + happy-dom). Pins wire shapes
        # that have actually broken between bot ↔ dashboard.
        run: npm test

      - name: Build
        # The build is the third-best gate after typecheck + tests —
        # catches `import.meta.env` issues, missing assets, and bundler-
        # time regressions that the earlier gates don't.
        run: npm run build
